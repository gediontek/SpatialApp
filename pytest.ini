[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
markers =
    golden: end-to-end user-experience tests (real browser; LLM live with SPATIALAPP_GOLDEN_LIVE=1)
    slow: tests that hit the network or take >5s
