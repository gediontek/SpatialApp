<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Spatial Labeler</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        body {
            background: #f8f9fa;
            padding: 0;
            margin: 0;
            height: auto;
        }
        .dashboard-header {
            background: #007bff;
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dashboard-header h1 {
            margin: 0;
            font-size: 22px;
        }
        .dashboard-header a {
            color: white;
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 4px;
            font-size: 13px;
        }
        .dashboard-header a:hover {
            background: rgba(255,255,255,0.15);
        }
        .dashboard-content {
            max-width: 960px;
            margin: 24px auto;
            padding: 0 20px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        .dashboard-card {
            background: white;
            border-radius: 6px;
            border: 1px solid #ddd;
            padding: 20px;
        }
        .dashboard-card h2 {
            margin: 0 0 14px 0;
            font-size: 16px;
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 8px;
        }
        .dashboard-card.full-width {
            grid-column: 1 / -1;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .stat-item {
            text-align: center;
            padding: 12px 8px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
            display: block;
        }
        .stat-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
            display: block;
        }
        .session-list, .layer-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .session-list li, .layer-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        .session-list li:last-child, .layer-list li:last-child {
            border-bottom: none;
        }
        .session-info, .layer-info {
            flex: 1;
        }
        .session-id, .layer-name {
            font-weight: bold;
            color: #333;
        }
        .session-meta, .layer-meta {
            color: #888;
            font-size: 11px;
            margin-top: 2px;
        }
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background: #c82333;
        }
        .empty-state {
            color: #999;
            font-style: italic;
            font-size: 13px;
            padding: 10px 0;
        }
        .bar-chart {
            margin-top: 8px;
        }
        .bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            font-size: 12px;
        }
        .bar-label {
            width: 100px;
            text-align: right;
            padding-right: 10px;
            color: #555;
        }
        .bar-fill {
            height: 18px;
            background: #007bff;
            border-radius: 3px;
            min-width: 2px;
            transition: width 0.3s;
        }
        .bar-value {
            margin-left: 8px;
            color: #666;
            font-size: 11px;
        }
        .loading-msg {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        @media (max-width: 700px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .stat-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <h1>Dashboard <span id="username-display"></span></h1>
        <a href="/">Back to Map</a>
    </div>

    <div class="dashboard-content">
        <div id="loading" class="loading-msg">Loading dashboard...</div>

        <div id="dashboard-data" style="display:none;">
            <!-- Stats -->
            <div class="dashboard-grid">
                <div class="dashboard-card full-width">
                    <h2>Usage Statistics</h2>
                    <div class="stat-grid">
                        <div class="stat-item">
                            <span class="stat-value" id="stat-queries">0</span>
                            <span class="stat-label">Total Queries</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="stat-tokens">0</span>
                            <span class="stat-label">Tokens Used</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="stat-response">0</span>
                            <span class="stat-label">Avg Response (ms)</span>
                        </div>
                    </div>
                </div>

                <!-- Sessions -->
                <div class="dashboard-card">
                    <h2>Chat Sessions</h2>
                    <ul class="session-list" id="session-list"></ul>
                </div>

                <!-- Layers -->
                <div class="dashboard-card">
                    <h2>Saved Layers</h2>
                    <ul class="layer-list" id="layer-list"></ul>
                </div>
            </div>
        </div>

        <div id="error-msg" style="display:none;" class="dashboard-card">
            <p style="color:#dc3545;"></p>
        </div>
    </div>

    <script nonce="{{ csp_nonce }}">
        (function() {
            var token = localStorage.getItem('api_token') || '';
            var headers = {'Content-Type': 'application/json'};
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }

            fetch('/api/dashboard', {headers: headers})
                .then(function(resp) {
                    if (!resp.ok) {
                        throw new Error(resp.status === 401 ? 'Please log in to view your dashboard.' : 'Failed to load dashboard.');
                    }
                    return resp.json();
                })
                .then(function(data) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('dashboard-data').style.display = 'block';
                    renderDashboard(data);
                })
                .catch(function(err) {
                    document.getElementById('loading').style.display = 'none';
                    var errDiv = document.getElementById('error-msg');
                    errDiv.style.display = 'block';
                    errDiv.querySelector('p').textContent = err.message;
                });

            function renderDashboard(data) {
                // Username
                var username = data.user ? data.user.username : 'anonymous';
                document.getElementById('username-display').textContent = '- ' + username;

                // Stats
                var stats = data.stats || {};
                document.getElementById('stat-queries').textContent = formatNumber(stats.total_queries || 0);
                document.getElementById('stat-tokens').textContent = formatNumber(stats.total_tokens_used || 0);
                document.getElementById('stat-response').textContent = formatNumber(Math.round(stats.avg_response_time_ms || 0));

                // Sessions
                var sessionList = document.getElementById('session-list');
                var sessions = data.sessions || [];
                if (sessions.length === 0) {
                    sessionList.innerHTML = '<li class="empty-state">No chat sessions yet.</li>';
                } else {
                    sessionList.innerHTML = '';
                    sessions.forEach(function(s) {
                        var li = document.createElement('li');
                        var infoDiv = document.createElement('div');
                        infoDiv.className = 'session-info';
                        var idSpan = document.createElement('span');
                        idSpan.className = 'session-id';
                        idSpan.textContent = s.session_id.length > 20 ? s.session_id.substring(0, 20) + '...' : s.session_id;
                        idSpan.title = s.session_id;
                        var metaDiv = document.createElement('div');
                        metaDiv.className = 'session-meta';
                        metaDiv.textContent = s.message_count + ' messages | ' + formatDate(s.updated_at);
                        infoDiv.appendChild(idSpan);
                        infoDiv.appendChild(metaDiv);
                        li.appendChild(infoDiv);

                        var btn = document.createElement('button');
                        btn.className = 'delete-btn';
                        btn.textContent = 'Delete';
                        btn.setAttribute('data-session-id', s.session_id);
                        btn.addEventListener('click', function() {
                            deleteSession(s.session_id, li);
                        });
                        li.appendChild(btn);
                        sessionList.appendChild(li);
                    });
                }

                // Layers
                var layerList = document.getElementById('layer-list');
                var layers = data.layers || [];
                if (layers.length === 0) {
                    layerList.innerHTML = '<li class="empty-state">No saved layers yet.</li>';
                } else {
                    layerList.innerHTML = '';
                    layers.forEach(function(l) {
                        var li = document.createElement('li');
                        var infoDiv = document.createElement('div');
                        infoDiv.className = 'layer-info';
                        var nameSpan = document.createElement('span');
                        nameSpan.className = 'layer-name';
                        nameSpan.textContent = l.name;
                        var metaDiv = document.createElement('div');
                        metaDiv.className = 'layer-meta';
                        metaDiv.textContent = l.feature_count + ' features | ' + formatDate(l.created_at);
                        infoDiv.appendChild(nameSpan);
                        infoDiv.appendChild(metaDiv);
                        li.appendChild(infoDiv);
                        layerList.appendChild(li);
                    });
                }
            }

            function deleteSession(sessionId, liElement) {
                if (!confirm('Delete this session?')) return;
                fetch('/api/sessions/' + encodeURIComponent(sessionId), {
                    method: 'DELETE',
                    headers: headers
                })
                .then(function(resp) {
                    if (!resp.ok) throw new Error('Delete failed');
                    liElement.remove();
                    // Check if list is now empty
                    var list = document.getElementById('session-list');
                    if (list.children.length === 0) {
                        list.innerHTML = '<li class="empty-state">No chat sessions yet.</li>';
                    }
                })
                .catch(function(err) {
                    alert('Failed to delete session: ' + err.message);
                });
            }

            function formatNumber(n) {
                if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
                if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
                return String(n);
            }

            function formatDate(dateStr) {
                if (!dateStr) return 'unknown';
                try {
                    var d = new Date(dateStr);
                    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
                } catch(e) {
                    return dateStr;
                }
            }
        })();
    </script>
</body>
</html>
