name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short -k "not e2e"
        env:
          TESTING: 1
          DISABLE_CLEANUP_TIMER: 1

      - name: Run adversarial harness (regression guards)
        run: pytest tests/harness/ -v --tb=short
        env:
          TESTING: 1
          DISABLE_CLEANUP_TIMER: 1

  golden:
    # Audit N20: browser tests skip silently when chromium isn't
    # installed (tests/golden/conftest.py:331). The previous CI didn't
    # run `playwright install`, so the 19 browser-render + 8 frontend-
    # auth tests were never gating. This dedicated job installs chromium
    # and runs the golden suite + the strict-mode tool-selection eval.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Install chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Run golden eval (workflow + browser-render + frontend-auth)
        run: pytest tests/golden/ -v --tb=short
        env:
          TESTING: 1
          DISABLE_CLEANUP_TIMER: 1

      - name: Run tool-selection eval (CI mode — strict thresholds)
        # Audit N21: --ci enforces tool/param/chain accuracy thresholds
        # and exits non-zero on regression. `make eval` uses --mock
        # locally for speed; CI gets the strict gate.
        run: python -m tests.eval.run_eval --ci

  security_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit pinned dependencies for known CVEs
        # `--strict` makes any audit finding fail the job. Use --ignore-vuln
        # to allow specific CVEs with a comment rationale before it lands
        # in main; do not silently lower the bar.
        run: pip-audit --strict --requirement requirements.txt

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check . --select E,F,W --ignore E501

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint, golden]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t spatialapp:latest .

      - name: Verify container starts
        run: |
          docker run -d --name test-app -p 5000:5000 spatialapp:latest
          sleep 5
          curl -f http://localhost:5000/api/health || exit 1
          docker stop test-app
